<div class="auth-container">
  <div class="auth-card glass-panel">
    <div class="auth-header">
      <h2>Join TaskSphere</h2>
      <p>Create an account to start managing your tasks.</p>
    </div>

    <div *ngIf="errorMsg" class="error-banner">
      {{ errorMsg }}
    </div>

    <form (ngSubmit)="register()" #registerForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          [(ngModel)]="username" 
          required 
          autocomplete="username"
          placeholder="Choose a username"
          class="form-input"
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required 
          autocomplete="new-password"
          placeholder="Create a strong password"
          class="form-input"
        >
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="!registerForm.form.valid || isLoading">
        <span *ngIf="!isLoading">Sign Up</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

      <p class="auth-footer">
        Already have an account? <a routerLink="/" class="text-link">Log In</a>
      </p>
    </form>
  </div>
</div>
