<div class="auth-container">
  <div class="auth-card glass-panel">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Log in to access your TaskSphere dashboard.</p>
    </div>

    <div *ngIf="errorMsg" class="error-banner">
      {{ errorMsg }}
    </div>

    <form (ngSubmit)="login()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          [(ngModel)]="username" 
          required 
          autocomplete="username"
          placeholder="Enter your username"
          class="form-input"
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required 
          autocomplete="current-password"
          placeholder="Enter your password"
          class="form-input"
        >
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="!loginForm.form.valid || isLoading">
        <span *ngIf="!isLoading">Log In</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

      <p class="auth-footer">
        Don't have an account? <a routerLink="/register" class="text-link">Sign Up</a>
      </p>
    </form>
  </div>
</div>
